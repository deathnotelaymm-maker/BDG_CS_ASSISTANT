name: v0.7.0a Render + Neon Production Checks

on:
  push:
    branches: [main, production]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VITE_API_BASE: https://api.example.com
      VITE_BDG_API_BASE: https://api.example.com
      VITE_API_BASE_URL: https://api.example.com
      VITE_USE_MOCK: "false"
      VITE_MOCK_MODE: "false"
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22.18.0
          cache: npm
          cache-dependency-path: |
            backend-api/package-lock.json
            guide-pro/package-lock.json
            chat-pro/package-lock.json
            admin-pro/package-lock.json

      - name: Verify Render backend
        working-directory: backend-api
        run: |
          npm ci
          npm run check
          npm audit --omit=dev --audit-level=high

      - name: Build Guide Pro
        working-directory: guide-pro
        run: |
          npm ci
          npm run build
          npm audit --omit=dev --audit-level=high

      - name: Build Chat Pro
        working-directory: chat-pro
        run: |
          npm ci
          npm run build
          npm audit --omit=dev --audit-level=high

      - name: Build Admin Pro
        working-directory: admin-pro
        run: |
          npm ci --legacy-peer-deps
          npm run build
          npm audit --omit=dev --audit-level=high
